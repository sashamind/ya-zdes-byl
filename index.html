<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Я здесь был</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }

    #status {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      transition: opacity 1s;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }

    #mode-indicator {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      transition: opacity 0.5s;
      pointer-events: none;
    }

    #start-btn {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 48px;
      font-size: 13px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      z-index: 500;
      transition: all 0.4s;
    }
    #start-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.6);
    }
    #start-btn:disabled {
      cursor: default;
      pointer-events: none;
    }

    /* Угловые зоны */
    #debug-btn {
      position: fixed;
      bottom: max(0px, env(safe-area-inset-bottom));
      left: max(0px, env(safe-area-inset-left));
      width: 60px; height: 60px;
      background: transparent; border: none;
      cursor: default; z-index: 101;
    }

    #mode-btn {
      position: fixed;
      top: max(0px, env(safe-area-inset-top));
      right: max(0px, env(safe-area-inset-right));
      width: 60px; height: 60px;
      background: transparent; border: none;
      cursor: default; z-index: 101;
    }

    /* Overlay */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200; opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    /* Панели */
    .panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(15,15,15,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: min(300px, 90vw);
      max-height: 80vh;
      z-index: 201;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      backdrop-filter: blur(20px);
      overflow-y: auto;
    }
    .panel.visible {
      opacity: 1; pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }
    .panel h3 {
      color: rgba(255,255,255,0.7);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin-bottom: 16px; text-align: center;
    }

    /* Режимы */
    #mode-list { display: flex; flex-direction: column; gap: 8px; }

    .mode-item {
      padding: 14px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      text-align: left; letter-spacing: 0.04em; width: 100%;
    }
    .mode-item:active { background: rgba(255,255,255,0.12); }
    .mode-item.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }
    .mode-item-title { font-size: 12px; margin-bottom: 4px; color: rgba(255,255,255,0.7); }
    .mode-item-desc  { font-size: 10px; color: rgba(255,255,255,0.3); line-height: 1.5; letter-spacing: 0.03em; }
    .mode-item.active .mode-item-title { color: #fff; }
    .mode-item.active .mode-item-desc  { color: rgba(255,255,255,0.5); }

    .close-panel-btn {
      margin-top: 14px; width: 100%;
      padding: 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.25);
      font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
    }

    /* Debug — аудио визуализатор */
    #debug-window {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      width: min(280px, 90vw);
      background: rgba(15,15,15,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      z-index: 300; display: none;
      flex-direction: column;
      backdrop-filter: blur(20px);
      overflow: hidden;
    }
    #debug-window.visible { display: flex; }

    #debug-header {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: space-between; align-items: center;
    }
    #debug-header h4 {
      color: rgba(255,255,255,0.7);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase; margin: 0;
    }
    #debug-close {
      background: transparent; border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer; font-size: 16px;
      padding: 0; width: 24px; height: 24px;
    }

    /* Полоска уровня громкости */
    #debug-meter-wrap {
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .meter-row {
      display: flex; align-items: center; gap: 10px;
    }
    .meter-label {
      color: rgba(255,255,255,0.3);
      font-size: 10px; letter-spacing: 0.08em;
      font-family: 'Courier New', monospace;
      width: 60px; flex-shrink: 0;
    }
    .meter-bar-bg {
      flex: 1; height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px; overflow: hidden;
    }
    .meter-bar {
      height: 100%; width: 0%;
      background: #ff2200;
      border-radius: 2px;
      transition: width 0.05s linear;
    }
    .meter-val {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      font-family: 'Courier New', monospace;
      width: 32px; text-align: right;
    }

    #debug-info {
      padding: 0 16px 14px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      font-family: 'Courier New', monospace;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <button id="start-btn" disabled>загрузка...</button>
  <div id="status">инициализация...</div>
  <div id="mode-indicator">способ 1</div>

  <!-- Угловые зоны -->
  <button id="debug-btn"></button>
  <button id="mode-btn"></button>

  <!-- Overlay -->
  <div id="overlay"></div>

  <!-- Панель режимов -->
  <div id="mode-menu" class="panel">
    <h3>способ</h3>
    <div id="mode-list">
      <button class="mode-item active" data-mode="1">
        <div class="mode-item-title">способ 1</div>
        <div class="mode-item-desc">звук = хаос<br>тишина = покой</div>
      </button>
      <button class="mode-item" data-mode="2">
        <div class="mode-item-title">способ 2</div>
        <div class="mode-item-desc">хаос всегда<br>звук = покой</div>
      </button>
    </div>
    <button class="close-panel-btn" id="close-mode-btn">закрыть</button>
  </div>

  <!-- Debug — аудио -->
  <div id="debug-window">
    <div id="debug-header">
      <h4>аудио анализ</h4>
      <button id="debug-close">✕</button>
    </div>
    <div id="debug-meter-wrap">
      <div class="meter-row">
        <div class="meter-label">raw rms</div>
        <div class="meter-bar-bg"><div class="meter-bar" id="bar-raw"></div></div>
        <div class="meter-val" id="val-raw">0</div>
      </div>
      <div class="meter-row">
        <div class="meter-label">smooth</div>
        <div class="meter-bar-bg"><div class="meter-bar" id="bar-smooth"></div></div>
        <div class="meter-val" id="val-smooth">0</div>
      </div>
      <div class="meter-row">
        <div class="meter-label">chaos</div>
        <div class="meter-bar-bg"><div class="meter-bar" id="bar-chaos"></div></div>
        <div class="meter-val" id="val-chaos">0</div>
      </div>
    </div>
    <div id="debug-info">
      <div id="dbg-mode">Способ: —</div>
      <div id="dbg-mic">Микрофон: ожидание</div>
      <div id="dbg-threshold">Порог: —</div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ========================================
    // КОНФИГ
    // ========================================
    var CONFIG = {
      text: 'Я ЗДЕСЬ БЫЛ',
      letterSize: 0.52,
      letterSpacing: 0.06,

      impulseStrength: 0.012,
      friction:        0.988,
      returnForce:     0.0004,
      maxSpeed:        0.09,

      rotImpulse:  0.012,
      rotFriction: 0.985,
      rotReturn:   0.0004,

      maxZ:     3.5,
      zImpulse: 0.018,

      // Сглаживание аудио-сигнала
      audioRiseSmoothing: 0.25,   // быстро реагирует на звук
      audioFallSmoothing: 0.04,   // медленно затухает

      // Порог шума микрофона (0–1)
      // Всё ниже — тишина, игнорируем
      audioNoiseFloor: 0.02,

      // Усиление сигнала (RMS обычно 0.01–0.3)
      audioGain: 3.5,

      litIntensity:   0.8,
      litDisplacement: 0.15,

      boundsX: 5.5,
      boundsY: 3.2,

      letterColor: '#ff2200',
    };

    // ========================================
    // DOM
    // ========================================
    var statusEl       = document.getElementById('status');
    var modeIndicator  = document.getElementById('mode-indicator');
    var startBtn       = document.getElementById('start-btn');
    var debugBtn       = document.getElementById('debug-btn');
    var modeBtn        = document.getElementById('mode-btn');
    var overlay        = document.getElementById('overlay');
    var modeMenuEl     = document.getElementById('mode-menu');
    var closeModeBtn   = document.getElementById('close-mode-btn');
    var debugWindow    = document.getElementById('debug-window');
    var debugClose     = document.getElementById('debug-close');
    var modeItems      = document.querySelectorAll('.mode-item');

    var barRaw    = document.getElementById('bar-raw');
    var barSmooth = document.getElementById('bar-smooth');
    var barChaos  = document.getElementById('bar-chaos');
    var valRaw    = document.getElementById('val-raw');
    var valSmooth = document.getElementById('val-smooth');
    var valChaos  = document.getElementById('val-chaos');
    var dbgMode      = document.getElementById('dbg-mode');
    var dbgMic       = document.getElementById('dbg-mic');
    var dbgThreshold = document.getElementById('dbg-threshold');

    // ========================================
    // СОСТОЯНИЕ
    // ========================================
    var letterMeshes        = [];
    var time                = 0;
    var appStarted          = false;
    var currentMode         = 1;

    var rawAudioLevel       = 0;   // RMS прямо с анализатора
    var smoothAudio         = 0;   // сглаженный сигнал
    var autonomousIntensity = 0;   // для режима 2

    // Web Audio
    var audioContext  = null;
    var analyser      = null;
    var dataArray     = null;
    var micStream     = null;

    // Генеративный звук (выход)
    var masterGain    = null;
    var noiseSource   = null;
    var noiseGain     = null;
    var crackleTimeout = null;

    // ========================================
    // THREE.JS
    // ========================================
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    var camera = new THREE.PerspectiveCamera(
      45, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.z = 7;

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    var litLight = new THREE.PointLight(0xff2200, 0);
    litLight.position.set(0, 0, 5);
    scene.add(litLight);

    // ========================================
    // МИКРОФОН — ИНИЦИАЛИЗАЦИЯ
    // ========================================
    async function initMicrophone() {
      try {
        statusEl.textContent   = 'запрашиваю микрофон...';
        statusEl.style.opacity = '1';
        statusEl.style.display = 'block';

        var stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        micStream  = stream;

        // AudioContext создаём здесь — после жеста пользователя
        if (!audioContext) {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
          await audioContext.resume();
        }

        // Источник — микрофон
        var source = audioContext.createMediaStreamSource(stream);

        // Анализатор
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;                 // 128 бинов
        analyser.smoothingTimeConstant = 0.5;   // встроенное сглаживание
        source.connect(analyser);
        // НЕ коннектим к destination — не слышим себя

        dataArray = new Uint8Array(analyser.fftSize);

        // Запускаем генеративный звук
        initOutputAudio();
        scheduleCrackle();

        statusEl.textContent = 'готово';
        setTimeout(function() {
          statusEl.style.opacity = '0';
          setTimeout(function() { statusEl.style.display = 'none'; }, 1000);
        }, 800);

        if (dbgMic) dbgMic.textContent = 'Микрофон: активен';

      } catch (err) {
        statusEl.textContent = 'нет доступа к микрофону';
        statusEl.style.color = 'rgba(255,100,100,0.8)';
        console.error(err);
        if (dbgMic) dbgMic.textContent = 'Микрофон: ' + err.name;
      }
    }

    // ========================================
    // МИКРОФОН — ЧИТАЕМ УРОВЕНЬ (RMS)
    // Вызывается каждый кадр
    // ========================================
    function readAudioLevel() {
      if (!analyser || !dataArray) return;

      analyser.getByteTimeDomainData(dataArray);

      // RMS по временному домену
      var sum = 0;
      for (var i = 0; i < dataArray.length; i++) {
        var normalized = (dataArray[i] - 128) / 128; // -1..+1
        sum += normalized * normalized;
      }
      var rms = Math.sqrt(sum / dataArray.length);

      // Применяем усиление и clamp
      rawAudioLevel = Math.min(1, rms * CONFIG.audioGain);

      // Сглаживание: быстрый подъём, медленное падение
      var smoothing = rawAudioLevel > smoothAudio
        ? CONFIG.audioRiseSmoothing
        : CONFIG.audioFallSmoothing;
      smoothAudio += (rawAudioLevel - smoothAudio) * smoothing;

      // Обновляем debug
      if (debugWindow.classList.contains('visible')) {
        var chaosNow = currentMode === 1 ? smoothAudio : autonomousIntensity;
        barRaw.style.width    = (rawAudioLevel * 100).toFixed(1) + '%';
        barSmooth.style.width = (smoothAudio   * 100).toFixed(1) + '%';
        barChaos.style.width  = (chaosNow      * 100).toFixed(1) + '%';
        valRaw.textContent    = (rawAudioLevel * 100).toFixed(0);
        valSmooth.textContent = (smoothAudio   * 100).toFixed(0);
        valChaos.textContent  = (chaosNow      * 100).toFixed(0);
        dbgMode.textContent      = 'Способ: ' + currentMode;
        dbgThreshold.textContent = 'Порог: ' + (CONFIG.audioNoiseFloor * 100).toFixed(0);
      }
    }

    // ========================================
    // ГЕНЕРАТИВНЫЙ ЗВУК — ВЫХОД
    // ========================================
    function initOutputAudio() {
      var bufferSize = audioContext.sampleRate * 2;
      var buffer     = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      var data       = buffer.getChannelData(0);
      for (var i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }

      noiseSource        = audioContext.createBufferSource();
      noiseSource.buffer = buffer;
      noiseSource.loop   = true;

      var bandpass             = audioContext.createBiquadFilter();
      bandpass.type            = 'bandpass';
      bandpass.frequency.value = 1200;
      bandpass.Q.value         = 0.5;

      var lowshelf             = audioContext.createBiquadFilter();
      lowshelf.type            = 'lowshelf';
      lowshelf.frequency.value = 300;
      lowshelf.gain.value      = 8;

      noiseGain            = audioContext.createGain();
      noiseGain.gain.value = 0;

      masterGain            = audioContext.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioContext.destination);

      noiseSource.connect(bandpass);
      bandpass.connect(lowshelf);
      lowshelf.connect(noiseGain);
      noiseGain.connect(masterGain);

      noiseSource.start();
    }

    function scheduleCrackle() {
      var delay = 3000 + Math.random() * 4000;
      crackleTimeout = setTimeout(function() {
        if (appStarted) playCrackle();
        scheduleCrackle();
      }, delay);
    }

    function playCrackle() {
      if (!audioContext || !masterGain) return;
      var buf  = audioContext.createBuffer(1, audioContext.sampleRate * 0.08, audioContext.sampleRate);
      var d    = buf.getChannelData(0);
      for (var i = 0; i < d.length; i++) {
        var p = i / d.length;
        d[i]  = (Math.random() * 2 - 1) * Math.pow(1 - p, 3) * Math.min(1, p * 20);
      }
      var src  = audioContext.createBufferSource();
      src.buffer = buf;
      var g    = audioContext.createGain();
      g.gain.value = 0.3 + Math.random() * 0.5;
      src.connect(g);
      g.connect(masterGain);
      src.start();
    }

    // ========================================
    // ЗВУК — УПРАВЛЕНИЕ ГРОМКОСТЬЮ ШУМА
    // ========================================
    function updateSound() {
      if (!audioContext || !noiseGain) return;

      var target;
      if (currentMode === 1) {
        // Громче когда звук есть
        target = smoothAudio > CONFIG.audioNoiseFloor ? smoothAudio * 0.6 : 0;
      } else {
        // Громче в тишине, тише при звуке
        target = (1 - smoothAudio) * 0.5;
      }

      noiseGain.gain.setTargetAtTime(target, audioContext.currentTime,
        smoothAudio > CONFIG.audioNoiseFloor ? 0.3 : 0.8
      );
    }

    // ========================================
    // БУКВЫ — ТЕКСТУРА
    // ========================================
    function createLetterTexture(char) {
      var size = 256;
      var c    = document.createElement('canvas');
      c.width  = c.height = size;
      var cx   = c.getContext('2d');
      cx.clearRect(0, 0, size, size);
      cx.fillStyle    = CONFIG.letterColor;
      cx.font         = '400 ' + Math.floor(size * 0.72) + 'px Rubik Mono One, monospace';
      cx.textAlign    = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(char, size / 2, size / 2);
      return new THREE.CanvasTexture(c);
    }

    // ========================================
    // БУКВЫ — СОЗДАНИЕ
    // ========================================
    function initLetters() {
      letterMeshes.forEach(function(m) {
        if (!m) return;
        scene.remove(m);
        m.geometry.dispose();
        m.material.dispose();
      });
      letterMeshes = [];

      var chars        = CONFIG.text.split('');
      var charCount    = chars.length;
      var fovRad       = (45 * Math.PI) / 180;
      var visibleH     = 2 * Math.tan(fovRad / 2) * camera.position.z;
      var visibleW     = visibleH * (window.innerWidth / window.innerHeight);
      var usableWidth  = visibleW * 0.90;
      var spacingRatio = 0.115;
      var autoSize     = usableWidth / (charCount + (charCount - 1) * spacingRatio);

      var isMobilePortrait = window.innerWidth < 600 && window.innerHeight > window.innerWidth;

      if (isMobilePortrait) {
        var words  = CONFIG.text.split(' ');
        var line1  = words.slice(0, 2).join(' ');
        var line2  = words.slice(2).join(' ');
        var maxLen = Math.max(line1.length, line2.length);
        autoSize   = usableWidth / (maxLen + (maxLen - 1) * spacingRatio);
        autoSize   = Math.max(0.15, Math.min(autoSize, 1.2));

        var step       = autoSize + autoSize * spacingRatio;
        var lineHeight = autoSize * 1.4;
        renderLine(line1.split(''), step, autoSize,  lineHeight * 0.5);
        renderLine(line2.split(''), step, autoSize, -lineHeight * 0.5);
      } else {
        autoSize = Math.max(0.15, Math.min(autoSize, 1.2));
        var step = autoSize + autoSize * spacingRatio;
        renderLine(chars, step, autoSize, 0);
      }

      CONFIG.letterSize    = autoSize;
      CONFIG.letterSpacing = autoSize * spacingRatio;
    }

    function renderLine(chars, step, size, offsetY) {
      var totalWidth = chars.length * step - (size * 0.115);
      var startX     = -totalWidth / 2 + step / 2;

      chars.forEach(function(char, i) {
        if (char === ' ') { letterMeshes.push(null); return; }

        var mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(size, size),
          new THREE.MeshBasicMaterial({
            map:         createLetterTexture(char),
            transparent: true,
            depthWrite:  false,
            opacity:     1.0,
          })
        );

        var homeX = startX + i * step;
        var homeY = offsetY;
        mesh.position.set(homeX, homeY, 0);

        mesh.userData = {
          homeX: homeX, homeY: homeY, homeZ: 0,
          vx: 0, vy: 0, vz: 0,
          vRotZ: 0, vRotX: 0,
          mass:       0.8 + Math.random() * 0.4,
          litPhase:   Math.random() * Math.PI * 2,
          glitchTimer:   0,
          glitchOffsetX: 0,
          glitchOffsetY: 0,
        };

        scene.add(mesh);
        letterMeshes.push(mesh);
      });
    }

    // ========================================
    // БУКВЫ — ФИЗИКА
    // ========================================
    function updateLetters() {
      time += 0.016;

      // Определяем интенсивность хаоса по режиму
      var chaosIntensity;

      if (currentMode === 1) {
        // Режим 1: звук → хаос
        var aboveFloor = Math.max(0, smoothAudio - CONFIG.audioNoiseFloor);
        chaosIntensity = Math.min(1, aboveFloor / (1 - CONFIG.audioNoiseFloor));

      } else {
        // Режим 2: тишина → хаос, звук        // → покой
        var soundPresence  = Math.min(1, smoothAudio * 4);
        var targetAuto     = 1 - soundPresence;
        autonomousIntensity += (targetAuto - autonomousIntensity) * 0.03;
        chaosIntensity = autonomousIntensity;
      }

      letterMeshes.forEach(function(mesh) {
        if (!mesh) return;
        var ud = mesh.userData;

        // === ИМПУЛЬС ОТ ХАОСА ===
        if (chaosIntensity > 0.01 && Math.random() < chaosIntensity * 0.4) {
          var s = CONFIG.impulseStrength / ud.mass;
          ud.vx    += (Math.random() - 0.5) * s * 2;
          ud.vy    += (Math.random() - 0.5) * s * 2;
          ud.vz    += (Math.random() - 0.5) * CONFIG.zImpulse;
          ud.vRotZ += (Math.random() - 0.5) * CONFIG.rotImpulse / ud.mass;
          ud.vRotX += (Math.random() - 0.5) * CONFIG.rotImpulse * 0.5 / ud.mass;
        }

        // === ПРИТЯЖЕНИЕ К ДОМУ ===
        var returnMult = (currentMode === 2)
          ? (1 + (1 - autonomousIntensity) * 10)
          : 1;

        ud.vx    += (ud.homeX - mesh.position.x) * CONFIG.returnForce * returnMult;
        ud.vy    += (ud.homeY - mesh.position.y) * CONFIG.returnForce * returnMult;
        ud.vz    += (ud.homeZ - mesh.position.z) * CONFIG.returnForce * returnMult;
        ud.vRotZ += -mesh.rotation.z * CONFIG.rotReturn * returnMult;
        ud.vRotX += -mesh.rotation.x * CONFIG.rotReturn * returnMult;

        // === ТРЕНИЕ ===
        var frictionMult = (currentMode === 2)
          ? Math.max(0.92, CONFIG.friction - (1 - autonomousIntensity) * 0.04)
          : CONFIG.friction;

        ud.vx    *= frictionMult;
        ud.vy    *= frictionMult;
        ud.vz    *= frictionMult;
        ud.vRotZ *= CONFIG.rotFriction;
        ud.vRotX *= CONFIG.rotFriction;

        // === ОГРАНИЧЕНИЕ СКОРОСТИ ===
        var speed = Math.sqrt(ud.vx * ud.vx + ud.vy * ud.vy);
        if (speed > CONFIG.maxSpeed) {
          ud.vx = (ud.vx / speed) * CONFIG.maxSpeed;
          ud.vy = (ud.vy / speed) * CONFIG.maxSpeed;
        }

        // === ПРИМЕНЯЕМ СКОРОСТЬ ===
        mesh.position.x += ud.vx;
        mesh.position.y += ud.vy;
        mesh.position.z += ud.vz;

        // === ОТСКОК ОТ ГРАНИЦ ===
        if (mesh.position.x > CONFIG.boundsX) {
          mesh.position.x = CONFIG.boundsX; ud.vx *= -0.6;
        } else if (mesh.position.x < -CONFIG.boundsX) {
          mesh.position.x = -CONFIG.boundsX; ud.vx *= -0.6;
        }
        if (mesh.position.y > CONFIG.boundsY) {
          mesh.position.y = CONFIG.boundsY; ud.vy *= -0.6;
        } else if (mesh.position.y < -CONFIG.boundsY) {
          mesh.position.y = -CONFIG.boundsY; ud.vy *= -0.6;
        }
        if (Math.abs(mesh.position.z) > CONFIG.maxZ) {
          mesh.position.z = Math.sign(mesh.position.z) * CONFIG.maxZ;
          ud.vz *= -0.3;
        }

        // === ВРАЩЕНИЕ ===
        mesh.rotation.z += ud.vRotZ;
        mesh.rotation.x += ud.vRotX;

        // === ВОЛНОВОЕ СМЕЩЕНИЕ ===
        mesh.position.x += Math.sin(time * 2 + ud.litPhase) * CONFIG.litDisplacement * chaosIntensity * 0.02;
        mesh.position.y += Math.cos(time * 1.5 + ud.litPhase) * CONFIG.litDisplacement * chaosIntensity * 0.015;

        // === ГЛИТЧ ===
        ud.glitchTimer -= 1;

        if (chaosIntensity > 0.3 && speed > CONFIG.maxSpeed * 0.5 && Math.random() < 0.03) {
          ud.glitchTimer   = 2 + Math.floor(Math.random() * 3);
          ud.glitchOffsetX = (Math.random() - 0.5) * 0.3 * chaosIntensity;
          ud.glitchOffsetY = (Math.random() - 0.5) * 0.15 * chaosIntensity;
        }

        if (ud.glitchTimer > 0) {
          mesh.position.x += ud.glitchOffsetX;
          mesh.position.y += ud.glitchOffsetY;
          var glitchScale   = 1 + (Math.random() - 0.5) * 0.15 * chaosIntensity;
          mesh.scale.set(glitchScale, 1 + (Math.random() - 0.5) * 0.1, 1);
          mesh.material.opacity = 0.4 + Math.random() * 0.6;
        } else {
          mesh.scale.set(1, 1, 1);
          var zRatio = Math.abs(mesh.position.z) / CONFIG.maxZ;
          mesh.material.opacity = Math.max(0.05, 1 - zRatio * 0.85);
        }

        litLight.intensity = chaosIntensity * CONFIG.litIntensity;
      });
    }

    // ========================================
    // ГЛАВНЫЙ ЦИКЛ
    // ========================================
    function animate() {
      requestAnimationFrame(animate);
      if (appStarted) {
        readAudioLevel();
        updateSound();
      }
      updateLetters();
      renderer.render(scene, camera);
    }

    // ========================================
    // ПАНЕЛИ
    // ========================================
    function closeAllPanels() {
      overlay.classList.remove('visible');
      modeMenuEl.classList.remove('visible');
    }

    function openModeMenu() {
      closeAllPanels();
      overlay.classList.add('visible');
      modeMenuEl.classList.add('visible');
      modeItems.forEach(function(item) {
        item.classList.toggle('active',
          parseInt(item.getAttribute('data-mode')) === currentMode
        );
      });
    }

    function toggleDebugWindow() {
      debugWindow.classList.toggle('visible');
    }

    // ========================================
    // ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
    // ========================================
    function setMode(mode) {
      currentMode = mode;
      modeIndicator.textContent = 'способ ' + mode;

      if (mode === 1) autonomousIntensity = 0;
      if (mode === 2) autonomousIntensity = 1;

      modeItems.forEach(function(item) {
        item.classList.toggle('active',
          parseInt(item.getAttribute('data-mode')) === currentMode
        );
      });

      modeIndicator.style.opacity = '1';
      setTimeout(function() {
        modeIndicator.style.opacity = '0.2';
      }, 1500);
    }

    // ========================================
    // СОБЫТИЯ
    // ========================================
    debugBtn.addEventListener('click', toggleDebugWindow);
    modeBtn.addEventListener('click', openModeMenu);
    closeModeBtn.addEventListener('click', closeAllPanels);
    overlay.addEventListener('click', closeAllPanels);
    debugClose.addEventListener('click', function() {
      debugWindow.classList.remove('visible');
    });

    modeItems.forEach(function(item) {
      item.addEventListener('click', function() {
        setMode(parseInt(item.getAttribute('data-mode')));
        closeAllPanels();
      });
    });

    document.addEventListener('keyup', function(e) {
      if (e.key === '1') setMode(1);
      if (e.key === '2') setMode(2);
      if (e.key === 'Escape') {
        closeAllPanels();
        debugWindow.classList.remove('visible');
      }
    });

    // ========================================
    // RESIZE
    // ========================================
    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      CONFIG.boundsX = 5.5 * (window.innerWidth / window.innerHeight) / (16 / 9);
      initLetters();
    });

    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        CONFIG.boundsX = 5.5 * (window.innerWidth / window.innerHeight) / (16 / 9);
        initLetters();
      }, 100);
    });

    // ========================================
    // КНОПКА СТАРТА
    // ========================================
    startBtn.addEventListener('click', function() {
      startBtn.style.opacity       = '0';
      startBtn.style.pointerEvents = 'none';
      setTimeout(function() { startBtn.style.display = 'none'; }, 400);
      appStarted = true;
      initMicrophone();
    });

    // ========================================
    // ИНИЦИАЛИЗАЦИЯ
    // ========================================
    window.addEventListener('load', function() {
      CONFIG.boundsX = 5.5 * (window.innerWidth / window.innerHeight) / (16 / 9);
      CONFIG.boundsY = 3.2;

      startBtn.disabled      = true;
      startBtn.textContent   = 'загрузка...';
      startBtn.style.opacity = '0.4';

      document.fonts.load('400 64px Rubik Mono One').then(function() {
        startBtn.disabled      = false;
        startBtn.textContent   = 'начать';
        startBtn.style.opacity = '1';
        startBtn.style.cursor  = 'pointer';
        initLetters();
        animate();
      }).catch(function() {
        startBtn.disabled      = false;
        startBtn.textContent   = 'начать';
        startBtn.style.opacity = '1';
        startBtn.style.cursor  = 'pointer';
        initLetters();
        animate();
      });
    });

  </script>
</body>
</html>
