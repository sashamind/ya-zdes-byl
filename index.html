<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Я здесь был</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #status {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      transition: opacity 1s;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #toggle-btn {
      position: fixed;
      bottom: 16px; right: 16px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      cursor: pointer;
      z-index: 101;
      transition: background 0.3s;
    }
    #toggle-btn:hover { background: rgba(255,255,255,0.5); }

    #menu {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    #menu.visible { display: flex; }
    #menu select {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      min-width: 220px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    #menu select option { background: #111; color: white; }
    #menu label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>

  <div id="status">инициализация...</div>
  <button id="toggle-btn"></button>
  <div id="menu">
    <label>выбор камеры</label>
    <select id="camera-select"><option value="">загрузка...</option></select>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>

  <script>
    // ========================================
    // НАСТРОЙКИ
    // ========================================
    const CONFIG = {
      text: 'Я ЗДЕСЬ БЫЛ',
      letterSize: 0.52,
      letterSpacing: 0.06,

      // --- Реакция на движение ---
      repelRadius: 3.5,        // было 2.2 — шире зона реакции
      repelStrength: 0.04,     // было 0.006 — в 7 раз сильнее толчок
      repelStrengthZ: 0.025,   // было 0.004

      // --- Органический дрейф ---
      maxDisplace: 2.2,        // было 0.9 — буквы улетают дальше
      maxDisplaceZ: 1.4,       // было 0.6
      noiseSpeed: 0.004,

      // --- Плавность ---
      lerpSpeed: 0.022,
      rotationLerp: 0.018,
      maxRotation: 0.25,       // было 0.18

      // Сглаживание — делаем чуть резче чтобы быстрее реагировало
      motionSmoothing: 0.08,   // было 0.035

      motionThreshold: 10,     // было 15 — ловим даже слабое движение
      motionSampleStep: 5,
    };

    // ========================================
    // ПЕРЕМЕННЫЕ
    // ========================================
    const status      = document.getElementById('status');
    const toggleBtn   = document.getElementById('toggle-btn');
    const menu        = document.getElementById('menu');
    const cameraSelect = document.getElementById('camera-select');

    let currentStream = null;
    let videoElement  = null;
    let prevFrameData = null;
    let letterMeshes  = [];

    // Сглаженная интенсивность (0 — тишина, 1 — максимум)
    let smoothMotion = 0;

    // Точки движения в координатах 3D сцены
    let motionPoints = [];

    const motionCanvas = document.createElement('canvas');
    motionCanvas.width  = 160;
    motionCanvas.height = 120;
    const motionCtx = motionCanvas.getContext('2d');

    // ========================================
    // THREE.JS
    // ========================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.z = 7;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ========================================
    // ТЕКСТУРА БУКВЫ
    // ========================================
    function createLetterTexture(char) {
      const size = 256;
      const c    = document.createElement('canvas');
      c.width    = size;
      c.height   = size;
      const cx   = c.getContext('2d');

      cx.clearRect(0, 0, size, size);
      cx.fillStyle    = '#ffffff';
      cx.font         = `200 ${Math.floor(size * 0.72)}px 'Helvetica Neue', Helvetica, Arial, sans-serif`;
      cx.textAlign    = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(char, size / 2, size / 2);

      return new THREE.CanvasTexture(c);
    }

    // ========================================
    // СОЗДАНИЕ БУКВ
    // ========================================
    function initLetters() {
      for (const mesh of letterMeshes) {
        if (!mesh) continue;
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      letterMeshes = [];

      const chars      = CONFIG.text.split('');
      const step       = CONFIG.letterSize + CONFIG.letterSpacing;
      const totalWidth = chars.length * step - CONFIG.letterSpacing;
      const startX     = -totalWidth / 2 + step / 2;

      chars.forEach((char, i) => {
        if (char === ' ') {
          letterMeshes.push(null);
          return;
        }

        const texture  = createLetterTexture(char);
        const geometry = new THREE.PlaneGeometry(CONFIG.letterSize, CONFIG.letterSize);
        const material = new THREE.MeshBasicMaterial({
          map: texture,
          transparent: true,
          depthWrite: false,
          opacity: 1.0,
        });

        const mesh = new THREE.Mesh(geometry, material);
        const homeX = startX + i * step;

        mesh.position.set(homeX, 0, 0);

        mesh.userData = {
          // Дом
          homeX,
          homeY: 0,
          homeZ: 0,

          // Накопленное смещение от толчков
          // Это добавка к органическому дрейфу
          pushX: 0,
          pushY: 0,
          pushZ: 0,

          // Затухание толчка
          pushDecay: 0.92,

          // Уникальные параметры шума для каждой буквы
          noiseOffsetX: Math.random() * 100,
          noiseOffsetY: Math.random() * 100,
          noiseOffsetZ: Math.random() * 100,
          driftPhase:   Math.random() * Math.PI * 2,
          driftSpeed:   0.6 + Math.random() * 0.8,
        };

        scene.add(mesh);
        letterMeshes.push(mesh);
      });
    }

    // ========================================
    // ОРГАНИЧЕСКИЙ ШУМ
    // Несколько синусов с разными частотами
    // дают плавный непредсказуемый дрейф
    // ========================================
    function noise(offset, t) {
      return (
        Math.sin(t * 0.8  + offset)        * 0.5 +
        Math.sin(t * 1.4  + offset * 1.6)  * 0.3 +
        Math.sin(t * 0.35 + offset * 0.7)  * 0.2
      );
    }

    // ========================================
    // ОБНОВЛЕНИЕ БУКВ
    // Целевая позиция = дом + дрейф*smoothMotion + толчок
    // Буква плавно lerp-ит к цели каждый кадр
    // ========================================
    let time = 0;

    function updateLetters() {
      time += CONFIG.noiseSpeed;

      for (const mesh of letterMeshes) {
        if (!mesh) continue;

        const ud = mesh.userData;

        // --- Органический дрейф пропорционален smoothMotion ---
        const t  = time * ud.driftSpeed;
        const nx = noise(ud.noiseOffsetX, t) * CONFIG.maxDisplace  * smoothMotion;
        const ny = noise(ud.noiseOffsetY, t) * CONFIG.maxDisplace  * smoothMotion * 0.55;
        const nz = noise(ud.noiseOffsetZ, t) * CONFIG.maxDisplaceZ * smoothMotion;

        // --- Толчки от конкретных точек движения ---
        for (const point of motionPoints) {
          const dx   = mesh.position.x - point.x;
          const dy   = mesh.position.y - point.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONFIG.repelRadius && dist > 0) {
            const force = ((CONFIG.repelRadius - dist) / CONFIG.repelRadius)
                          * point.intensity
                          * smoothMotion; // толчок тоже масштабируется

            ud.pushX += (dx / dist) * CONFIG.repelStrength  * force;
            ud.pushY += (dy / dist) * CONFIG.repelStrength  * force;
            ud.pushZ += (Math.random() > 0.5 ? 1 : -1)
                        * CONFIG.repelStrengthZ * force;
          }
        }

        // --- Затухание толчка ---
        ud.pushX *= ud.pushDecay;
        ud.pushY *= ud.pushDecay;
        ud.pushZ *= ud.pushDecay;

        // --- Целевая позиция = дом + дрейф + затухающий толчок ---
        const targetX = ud.homeX + nx + ud.pushX;
        const targetY = ud.homeY + ny + ud.pushY;
        const targetZ = ud.homeZ + nz + ud.pushZ;

        // --- Целевое вращение ---
        const targetRotZ = noise(ud.noiseOffsetX + 10, t) * CONFIG.maxRotation * smoothMotion;
        const targetRotX = noise(ud.noiseOffsetY + 10, t) * CONFIG.maxRotation * smoothMotion * 0.4;

        // --- Плавное движение к цели (lerp) ---
        // Нет пружин, нет инерции — просто скользим к цели
        mesh.position.x += (targetX - mesh.position.x) * CONFIG.lerpSpeed;
        mesh.position.y += (targetY - mesh.position.y) * CONFIG.lerpSpeed;
        mesh.position.z += (targetZ - mesh.position.z) * CONFIG.lerpSpeed;

        mesh.rotation.z += (targetRotZ - mesh.rotation.z) * CONFIG.rotationLerp;
        mesh.rotation.x += (targetRotX - mesh.rotation.x) * CONFIG.rotationLerp;

        // --- Прозрачность от глубины ---
        const zDist = Math.abs(mesh.position.z) / CONFIG.maxDisplaceZ;
        mesh.material.opacity = Math.max(0.15, 1 - zDist * 0.45);
      }
    }

    // ========================================
    // ОПРЕДЕЛЕНИЕ ДВИЖЕНИЯ
    // Возвращает интенсивность (0-1) и точки движения
    // ========================================
    function detectMotion() {
      if (!videoElement || videoElement.readyState < 2) return { intensity: 0, points: [] };

      const w = motionCanvas.width;
      const h = motionCanvas.height;

      motionCtx.save();
      motionCtx.scale(-1, 1);
      motionCtx.drawImage(videoElement, -w, 0, w, h);
      motionCtx.restore();

      const currentData = motionCtx.getImageData(0, 0, w, h).data;
      const points      = [];
      let   totalDiff   = 0;
      let   pixelCount  = 0;

      if (prevFrameData) {
        for (let y = 0; y < h; y += CONFIG.motionSampleStep) {
          for (let x = 0; x < w; x += CONFIG.motionSampleStep) {
            const idx  = (y * w + x) * 4;
            const dr   = Math.abs(currentData[idx]     - prevFrameData[idx]);
            const dg   = Math.abs(currentData[idx + 1] - prevFrameData[idx + 1]);
            const db   = Math.abs(currentData[idx + 2] - prevFrameData[idx + 2]);
            const diff = (dr + dg + db) / 3;

            if (diff > CONFIG.motionThreshold) {
              totalDiff += diff;

              // Переводим пиксели → координаты 3D сцены
              const nx     =  (x / w) * 2 - 1;
              const ny     = -((y / h) * 2 - 1);
              const aspect =  window.innerWidth / window.innerHeight;
              const fovRad =  45 * Math.PI / 180;
              const halfH  =  Math.tan(fovRad / 2) * camera.position.z;

              points.push({
                x: nx * halfH * aspect,
                y: ny * halfH,
                intensity: Math.min(1, diff / 80),
              });
            }
            pixelCount++;
          }
        }
      }

      prevFrameData = new Uint8Array(currentData);

      const raw = pixelCount > 0 ? (totalDiff / pixelCount) / 8 : 0;
      return {
        intensity: Math.min(1, raw),
        points,
      };
    }

    // ========================================
    // ГЛАВНЫЙ ЦИКЛ
    // ========================================
    function animate() {
      requestAnimationFrame(animate);

      const { intensity, points } = detectMotion();
      motionPoints = points;

      // Плавно меняем общую интенсивность
      smoothMotion += (intensity - smoothMotion) * CONFIG.motionSmoothing;

      updateLetters();
      renderer.render(scene, camera);
    }

    // ========================================
    // КАМЕРА
    // ========================================
    async function startCamera(deviceId = null) {
      if (currentStream) currentStream.getTracks().forEach(t => t.stop());

      const constraints = {
        video: deviceId
          ? { deviceId: { exact: deviceId }, width: 640, height: 480 }
          : { width: 640, height: 480, facingMode: 'user' }
      };

      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);

        if (!videoElement) {
          videoElement = document.createElement('video');
          videoElement.style.display = 'none';
          videoElement.playsInline = true;
          document.body.appendChild(videoElement);
        }

        videoElement.srcObject = currentStream;
        await videoElement.play();
        prevFrameData = null;

        status.style.opacity = '0';
        setTimeout(() => { status.style.display = 'none'; }, 1000);

      } catch (err) {
        status.textContent = 'нет доступа к камере';
        console.error(err);
      }
    }

    async function loadCameraList() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === 'videoinput');
        cameraSelect.innerHTML = '';
        cameras.forEach((cam, i) => {
          const opt = document.createElement('option');
          opt.value       = cam.deviceId;
          opt.textContent = cam.label || `Камера ${i + 1}`;
          cameraSelect.appendChild(opt);
        });
      } catch (err) { console.error(err); }
    }

    // ========================================
    // СОБЫТИЯ
    // ========================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    toggleBtn.addEventListener('click', async () => {
      menu.classList.toggle('visible');
      if (menu.classList.contains('visible')) await loadCameraList();
    });

    cameraSelect.addEventListener('change', e => {
      if (e.target.value) startCamera(e.target.value);
    });

    // ========================================
    // СТАРТ
    // ========================================
    initLetters();
    animate();
    status.textContent = 'запрос камеры...';
    startCamera();

  </script>
</body>
</html>
