<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Я здесь был</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    #status {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      transition: opacity 1s;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }

    /* Невидимая зона нажатия в углу — 60x60px */
    #settings-btn {
      position: fixed;
      bottom: 0; right: 0;
      width: 60px; height: 60px;
      background: transparent;
      border: none;
      cursor: default;
      z-index: 101;
    }

    /* Затемнение */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Меню */
    #menu {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(15,15,15,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 300px;
      z-index: 201;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      backdrop-filter: blur(20px);
    }
    #menu.visible {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    #menu h3 {
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin-bottom: 16px;
      text-align: center;
    }

    #camera-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .camera-item {
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      text-align: left;
      letter-spacing: 0.04em;
      width: 100%;
    }
    .camera-item:hover {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-color: rgba(255,255,255,0.2);
    }
    .camera-item.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    #close-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }
    #close-btn:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

  <div id="status">инициализация...</div>

  <!-- Невидимая кнопка в правом нижнем углу -->
  <button id="settings-btn"></button>

  <div id="overlay"></div>

  <div id="menu">
    <h3>камера</h3>
    <div id="camera-list"></div>
    <button id="close-btn">закрыть</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>

  <script>
    // ========================================
    // НАСТРОЙКИ
    // ========================================
    var CONFIG = {
      text: 'Я ЗДЕСЬ БЫЛ',
      letterSize: 0.52,
      letterSpacing: 0.06,

      // Базовая сила импульса — НЕ зависит от интенсивности движения
      // Интенсивность влияет только на то КАК ДАЛЕКО улетают буквы
      impulseStrength: 0.012,

      // Трение
      friction: 0.988,

      // Возврат домой
      returnForce: 0.0004,

      // Скорость всегда одинаковая — ограничитель фиксированный
      maxSpeed: 0.09,

      // Вращение
      rotImpulse: 0.012,
      rotFriction: 0.985,
      rotReturn: 0.0004,

      // Глубина
      maxZ: 3.5,
      zImpulse: 0.018,

      // Сглаживание интенсивности
      motionRiseSmoothing: 0.15,
      motionFallSmoothing: 0.025,

      // Порог движения
      motionThreshold: 14,
      motionSampleStep: 5,
    };

    // ========================================
    // ПЕРЕМЕННЫЕ
    // ========================================
    var statusEl   = document.getElementById('status');
    var settingsBtn = document.getElementById('settings-btn');
    var overlay    = document.getElementById('overlay');
    var menuEl     = document.getElementById('menu');
    var cameraList = document.getElementById('camera-list');
    var closeBtn   = document.getElementById('close-btn');

    var currentStream  = null;
    var videoElement   = null;
    var prevFrameData  = null;
    var letterMeshes   = [];
    var smoothMotion   = 0;
    var activeCameraId = null;

    var motionCanvas = document.createElement('canvas');
    motionCanvas.width  = 160;
    motionCanvas.height = 120;
    var motionCtx = motionCanvas.getContext('2d');

    // ========================================
    // THREE.JS
    // ========================================
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    var camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1, 100
    );
    camera.position.z = 7;

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // ========================================
    // ТЕКСТУРА БУКВЫ
    // ========================================
    function createLetterTexture(char) {
      var size = 256;
      var c = document.createElement('canvas');
      c.width = c.height = size;
      var cx = c.getContext('2d');
      cx.clearRect(0, 0, size, size);
      cx.fillStyle    = '#ffffff';
      cx.font         = '200 ' + Math.floor(size * 0.72) + 'px Helvetica Neue, Helvetica, Arial, sans-serif';
      cx.textAlign    = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(char, size / 2, size / 2);
      return new THREE.CanvasTexture(c);
    }

    // ========================================
    // СОЗДАНИЕ БУКВ
    // ========================================
    function initLetters() {
      for (var i = 0; i < letterMeshes.length; i++) {
        var m = letterMeshes[i];
        if (!m) continue;
        scene.remove(m);
        m.geometry.dispose();
        m.material.dispose();
      }
      letterMeshes = [];

      var chars      = CONFIG.text.split('');
      var step       = CONFIG.letterSize + CONFIG.letterSpacing;
      var totalWidth = chars.length * step - CONFIG.letterSpacing;
      var startX     = -totalWidth / 2 + step / 2;

      for (var i = 0; i < chars.length; i++) {
        var char = chars[i];
        if (char === ' ') { letterMeshes.push(null); continue; }

        var mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(CONFIG.letterSize, CONFIG.letterSize),
          new THREE.MeshBasicMaterial({
            map: createLetterTexture(char),
            transparent: true,
            depthWrite: false,
            opacity: 1.0,
          })
        );

        var homeX = startX + i * step;
        mesh.position.set(homeX, 0, 0);

        mesh.userData = {
          homeX: homeX, homeY: 0, homeZ: 0,
          vx: 0, vy: 0, vz: 0,
          vRotZ: 0, vRotX: 0,
          mass: 0.8 + Math.random() * 0.4,
        };

        scene.add(mesh);
        letterMeshes.push(mesh);
      }
    }

    // ========================================
    // ФИЗИКА
    //
    // Ключевое изменение:
    // smoothMotion влияет только на ВЕРОЯТНОСТЬ и ДАЛЬНОСТЬ импульса
    // но НЕ на скорость — скорость всегда одинаковая
    // Аналогия: ветер решает куда лететь пылинке,
    // но сама пылинка всегда движется с одной скоростью
    // ========================================
    function updateLetters(motionIntensity) {
      for (var i = 0; i < letterMeshes.length; i++) {
        var mesh = letterMeshes[i];
        if (!mesh) continue;

        var ud = mesh.userData;

        // Импульс срабатывает с вероятностью пропорциональной движению
        // smoothMotion > random → толчок произошёл
        // Это значит: больше движения = чаще толчки = дальше улетают
        // Но каждый отдельный толчок одинаковой силы
        if (motionIntensity > 0.01 && Math.random() < motionIntensity * 0.4) {
          var s = CONFIG.impulseStrength / ud.mass;

          ud.vx    += (Math.random() - 0.5) * s * 2;
          ud.vy    += (Math.random() - 0.5) * s * 2;
          ud.vz    += (Math.random() - 0.5) * CONFIG.zImpulse;
          ud.vRotZ += (Math.random() - 0.5) * CONFIG.rotImpulse / ud.mass;
          ud.vRotX += (Math.random() - 0.5) * CONFIG.rotImpulse * 0.5 / ud.mass;
        }

        // Возврат домой
        ud.vx += (ud.homeX - mesh.position.x) * CONFIG.returnForce;
        ud.vy += (ud.homeY - mesh.position.y) * CONFIG.returnForce;
        ud.vz += (ud.homeZ - mesh.position.z) * CONFIG.returnForce;

        // Возврат вращения к нулю
        ud.vRotZ += (0 - mesh.rotation.z) * CONFIG.rotReturn;
        ud.vRotX += (0 - mesh.rotation.x) * CONFIG.rotReturn;

        // Трение — одинаковое всегда, не зависит от движения
        ud.vx    *= CONFIG.friction;
        ud.vy    *= CONFIG.friction;
        ud.vz    *= CONFIG.friction;
        ud.vRotZ *= CONFIG.rotFriction;
        ud.vRotX *= CONFIG.rotFriction;

        // Ограничение скорости — фиксированное
        var speed = Math.sqrt(ud.vx * ud.vx + ud.vy * ud.vy);
        if (speed > CONFIG.maxSpeed) {
          ud.vx = (ud.vx / speed) * CONFIG.maxSpeed;
          ud.vy = (ud.vy / speed) * CONFIG.maxSpeed;
        }

        // Применяем скорость
        mesh.position.x += ud.vx;
        mesh.position.y += ud.vy;
        mesh.position.z += ud.vz;

        // Ограничение глубины
        if (Math.abs(mesh.position.z) > CONFIG.maxZ) {
          mesh.position.z = Math.sign(mesh.position.z) * CONFIG.maxZ;
          ud.vz *= -0.3;
        }

        mesh.rotation.z += ud.vRotZ;
        mesh.rotation.x += ud.vRotX;

        // Прозрачность от глубины
        var zRatio = Math.abs(mesh.position.z) / CONFIG.maxZ;
        mesh.material.opacity = Math.max(0.05, 1 - zRatio * 0.85);
      }
    }

    // ========================================
    // ОПРЕДЕЛЕНИЕ ДВИЖЕНИЯ
    // ========================================
    function detectMotion() {
      if (!videoElement || videoElement.readyState < 2) return 0;

      var w = motionCanvas.width;
      var h = motionCanvas.height;

      motionCtx.save();
      motionCtx.scale(-1, 1);
      motionCtx.drawImage(videoElement, -w, 0, w, h);
      motionCtx.restore();

      var currentData = motionCtx.getImageData(0, 0, w, h).data;
      var totalDiff   = 0;
      var pixelCount  = 0;

      if (prevFrameData) {
        for (var y = 0; y < h; y += CONFIG.motionSampleStep) {
          for (var x = 0; x < w; x += CONFIG.motionSampleStep) {
            var idx  = (y * w + x) * 4;
            var dr   = Math.abs(currentData[idx]     - prevFrameData[idx]);
            var dg   = Math.abs(currentData[idx + 1] - prevFrameData[idx + 1]);
            var db   = Math.abs(currentData[idx + 2] - prevFrameData[idx + 2]);
            var diff = (dr + dg + db) / 3;
            if (diff > CONFIG.motionThreshold) totalDiff += diff;
            pixelCount++;
          }
        }
      }

      prevFrameData = new Uint8Array(currentData);
      var raw = pixelCount > 0 ? (totalDiff / pixelCount) / 10 : 0;
      return Math.min(1, raw);
    }

    // ========================================
    // ГЛАВНЫЙ ЦИКЛ
    // ========================================
    function animate() {
      requestAnimationFrame(animate);

      var rawMotion = detectMotion();
      var smoothing = rawMotion > smoothMotion
        ? CONFIG.motionRiseSmoothing
        : CONFIG.motionFallSmoothing;
      smoothMotion += (rawMotion - smoothMotion) * smoothing;

      updateLetters(smoothMotion);
      renderer.render(scene, camera);
    }

    // ========================================
    // ЗАПУСК КАМЕРЫ
    // ========================================
    async function startCamera(deviceId) {
      if (currentStream) {
        currentStream.getTracks().forEach(function(t) { t.stop(); });
      }

      var constraints = {
        video: deviceId
          ? { deviceId: { exact: deviceId }, width: 640, height: 480 }
          : { width: 640, height: 480, facingMode: 'user' }
      };

      try {
        statusEl.textContent   = 'запрашиваю камеру...';
        statusEl.style.opacity = '1';
        statusEl.style.display = 'block';

        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        activeCameraId = deviceId || null;

        if (!videoElement) {
          videoElement = document.createElement('video');
          videoElement.style.display = 'none';
          videoElement.playsInline = true;
          document.body.appendChild(videoElement);
        }

        videoElement.srcObject = currentStream;
        await videoElement.play();
        prevFrameData = null;

        statusEl.textContent = 'готово';
        setTimeout(function() {
          statusEl.style.opacity = '0';
          setTimeout(function() { statusEl.style.display = 'none'; }, 1000);
        }, 800);

      } catch (err) {
        statusEl.textContent   = 'ошибка: ' + err.name;
        statusEl.style.opacity = '1';
        statusEl.style.color   = 'rgba(255,100,100,0.8)';
        console.error(err);
      }
    }

    // ========================================
    // СПИСОК КАМЕР
    // ========================================
    async function loadCameraList() {
      cameraList.innerHTML = '';

      try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        var devices = await navigator.mediaDevices.enumerateDevices();
        var cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });

        if (cameras.length === 0) {
          cameraList.innerHTML = '<div class="camera-item">камеры не найдены</div>';
          return;
        }

        cameras.forEach(function(cam, i) {
          var btn = document.createElement('button');
          btn.className   = 'camera-item';
          btn.textContent = cam.label || ('Камера ' + (i + 1));

          if (activeCameraId === cam.deviceId || (!activeCameraId && i === 0)) {
            btn.classList.add('active');
          }

          btn.addEventListener('click', function() {
            cameraList.querySelectorAll('.camera-item').forEach(function(el) {
              el.classList.remove('active');
            });
            btn.classList.add('active');
            startCamera(cam.deviceId);
            closeMenu();
          });

          cameraList.appendChild(btn);
        });

      } catch (err) {
        cameraList.innerHTML = '<div class="camera-item">нет доступа к камере</div>';
        console.error(err);
      }
    }

    // ========================================
    // ОТКРЫТЬ / ЗАКРЫТЬ МЕНЮ
    // ========================================
    function openMenu() {
      overlay.classList.add('visible');
      menuEl.classList.add('visible');
      loadCameraList();
    }

    function closeMenu() {
      overlay.classList.remove('visible');
      menuEl.classList.remove('visible');
    }

    // ========================================
    // СОБЫТИЯ
    // ========================================

    // Невидимая кнопка в углу
    settingsBtn.addEventListener('click', openMenu);

    // Клик на затемнение закрывает меню
    overlay.addEventListener('click', closeMenu);
    closeBtn.addEventListener('click', closeMenu);

    // Escape закрывает меню
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeMenu();
    });

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ========================================
    // СТАРТ
    // ========================================
    initLetters();
    animate();
    startCamera();

  </script>
</body>
</html>
