<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Я здесь был</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }

    #status {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      transition: opacity 1s;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      white-space: nowrap;
    }

    #mode-indicator {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      z-index: 100;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      transition: opacity 0.5s;
    }

    #start-btn {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 48px;
      font-size: 13px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      cursor: pointer;
      z-index: 500;
      transition: all 0.4s;
    }
    #start-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.6);
    }

    #settings-btn {
      position: fixed;
      bottom: max(0px, env(safe-area-inset-bottom));
      right: max(0px, env(safe-area-inset-right));
      width: 60px; height: 60px;
      background: transparent;
      border: none;
      cursor: default;
      z-index: 101;
    }

    #debug-btn {
      position: fixed;
      bottom: max(0px, env(safe-area-inset-bottom));
      left: max(0px, env(safe-area-inset-left));
      width: 60px; height: 60px;
      background: transparent;
      border: none;
      cursor: default;
      z-index: 101;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    #menu {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      background: rgba(15,15,15,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: min(300px, 90vw);
      max-height: 80vh;
      z-index: 201;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      backdrop-filter: blur(20px);
      overflow-y: auto;
    }
    #menu.visible {
      opacity: 1;
      pointer-events: all;
      transform: translate(-50%, -50%) scale(1);
    }

    #menu h3 {
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin-bottom: 16px;
      text-align: center;
    }

    #camera-list { display: flex; flex-direction: column; gap: 8px; }

    .camera-item {
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      text-align: left;
      letter-spacing: 0.04em;
      width: 100%;
    }
    .camera-item:active { background: rgba(255,255,255,0.12); }
    .camera-item.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.3);
      color: #fff;
    }

    #close-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      cursor: pointer;
    }

    #debug-window {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      width: min(320px, 90vw);
      height: min(400px, 60vh);
      background: rgba(15,15,15,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      z-index: 300;
      display: none;
      flex-direction: column;
      backdrop-filter: blur(20px);
      overflow: hidden;
    }
    #debug-window.visible { display: flex; }

    #debug-header {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #debug-header h4 {
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }
    #debug-close {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      width: 24px; height: 24px;
    }

    #debug-video-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }
    #debug-video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #debug-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #debug-info {
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      line-height: 1.6;
      max-height: 120px;
      overflow-y: auto;
    }

    #webcam-video { display: none; }
  </style>
</head>
<body>

  <button id="start-btn">начать</button>
  <div id="status">инициализация...</div>
  <div id="mode-indicator">режим 1</div>
  <button id="settings-btn"></button>
  <button id="debug-btn"></button>

  <div id="overlay"></div>
  <div id="menu">
    <h3>камера</h3>
    <div id="camera-list"></div>
    <button id="close-btn">закрыть</button>
  </div>

  <div id="debug-window">
    <div id="debug-header">
      <h4>детекция скелета</h4>
      <button id="debug-close">✕</button>
    </div>
    <div id="debug-video-container">
      <video id="debug-video"></video>
      <canvas id="debug-canvas"></canvas>
    </div>
    <div id="debug-info"><div>Ожидание...</div></div>
  </div>

  <video id="webcam-video" playsinline></video>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

  <script>

    // ========================================
    // КОНФИГ
    // ========================================
    var CONFIG = {
      text: 'Я ЗДЕСЬ БЫЛ',
      letterSize: 0.52,
      letterSpacing: 0.06,

      impulseStrength: 0.012,
      friction: 0.988,
      returnForce: 0.0004,
      maxSpeed: 0.09,

      rotImpulse: 0.012,
      rotFriction: 0.985,
      rotReturn: 0.0004,

      maxZ: 3.5,
      zImpulse: 0.018,

      motionRiseSmoothing: 0.15,
      motionFallSmoothing: 0.025,

      motionThreshold: 0.004,
      motionNoiseFloor: 0.015,
      motionScale: 40,

      audioEnabled: true,
      litIntensity: 0.8,
      litDisplacement: 0.15,

      boundsX: 5.5,
      boundsY: 3.2,
    };

    // Только ключевые суставы — без лица и ладоней
    var KEY_JOINTS = [11, 12, 13, 14, 15, 16, 23, 24, 25, 26, 27, 28];

    var SKELETON_CONNECTIONS = [
      [11,12],[11,13],[13,15],[12,14],[14,16],
      [11,23],[12,24],[23,24],
      [23,25],[25,27],[24,26],[26,28],
    ];

    // ========================================
    // DOM
    // ========================================
    var statusEl      = document.getElementById('status');
    var modeIndicator = document.getElementById('mode-indicator');
    var startBtn      = document.getElementById('start-btn');
    var settingsBtn   = document.getElementById('settings-btn');
    var debugBtn      = document.getElementById('debug-btn');
    var overlay       = document.getElementById('overlay');
    var menuEl        = document.getElementById('menu');
    var cameraList    = document.getElementById('camera-list');
    var closeBtn      = document.getElementById('close-btn');
    var debugWindow   = document.getElementById('debug-window');
    var debugVideo    = document.getElementById('debug-video');
    var debugCanvas   = document.getElementById('debug-canvas');
    var debugInfo     = document.getElementById('debug-info');
    var debugClose    = document.getElementById('debug-close');
    var webcamVideo   = document.getElementById('webcam-video');

    // ========================================
    // ПЕРЕМЕННЫЕ
    // ========================================
    var letterMeshes        = [];
    var smoothMotion        = 0;
    var activeCameraId      = null;
    var lastPoseLandmarks   = null;
    var poseMotionIntensity = 0;
    var time                = 0;
    var appStarted          = false;

    // Режим 1 = движение = хаос
    // Режим 2 = всегда хаос, человек в кадре = покой
    var currentMode = 1;

    // Присутствие человека в кадре (для режима 2)
    var personVisible  = false;
    var smoothPresence = 0;

    // Автономный хаос для режима 2
    var autonomousIntensity = 0;

    // Audio
    var audioContext   = null;
    var masterGain     = null;
    var noiseSource    = null;
    var noiseGain      = null;
    var crackleTimeout = null;
        // ========================================
    // THREE.JS
    // ========================================
    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    var camera = new THREE.PerspectiveCamera(
      45, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.z = 7;

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    var litLight = new THREE.PointLight(0xffffff, 0);
    litLight.position.set(0, 0, 5);
    scene.add(litLight);

    // ========================================
    // AUDIO — БЕЛЫЙ ШУМ
    // ========================================
    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
      if (!noiseSource) {
        createWhiteNoise();
        scheduleCrackle();
      }
    }

    function createWhiteNoise() {
      var bufferSize = audioContext.sampleRate * 2;
      var buffer     = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      var data       = buffer.getChannelData(0);

      for (var i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1);
      }

      noiseSource        = audioContext.createBufferSource();
      noiseSource.buffer = buffer;
      noiseSource.loop   = true;

      // Bandpass — оставляем средние частоты как у телевизора
      var bandpass             = audioContext.createBiquadFilter();
      bandpass.type            = 'bandpass';
      bandpass.frequency.value = 1200;
      bandpass.Q.value         = 0.5;

      // Lowshelf — добавляем немного низких частот
      var lowshelf             = audioContext.createBiquadFilter();
      lowshelf.type            = 'lowshelf';
      lowshelf.frequency.value = 300;
      lowshelf.gain.value      = 8;

      noiseGain            = audioContext.createGain();
      noiseGain.gain.value = 0;

      masterGain            = audioContext.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioContext.destination);

      // Цепочка: шум → bandpass → lowshelf → noiseGain → masterGain
      noiseSource.connect(bandpass);
      bandpass.connect(lowshelf);
      lowshelf.connect(noiseGain);
      noiseGain.connect(masterGain);

      noiseSource.start();
    }

    // ========================================
    // AUDIO — ТРЕСК
    // ========================================
    function scheduleCrackle() {
      var delay = 3000 + Math.random() * 4000;
      crackleTimeout = setTimeout(function() {
        if (appStarted) playCrackle();
        scheduleCrackle();
      }, delay);
    }

    function playCrackle() {
      if (!audioContext) return;

      var crackleBuffer = audioContext.createBuffer(
        1,
        audioContext.sampleRate * 0.08,
        audioContext.sampleRate
      );
      var crackleData = crackleBuffer.getChannelData(0);

      for (var i = 0; i < crackleData.length; i++) {
        var progress = i / crackleData.length;
        // Огибающая: резкий старт + плавный спад
        var envelope = Math.pow(1 - progress, 3) * Math.min(1, progress * 20);
        crackleData[i] = (Math.random() * 2 - 1) * envelope;
      }

      var crackleSource       = audioContext.createBufferSource();
      crackleSource.buffer    = crackleBuffer;
      var crackleGain         = audioContext.createGain();
      crackleGain.gain.value  = 0.3 + Math.random() * 0.5;

      crackleSource.connect(crackleGain);
      crackleGain.connect(masterGain);
      crackleSource.start();
    }

    // ========================================
    // AUDIO — УПРАВЛЕНИЕ ГРОМКОСТЬЮ
    // ========================================
    function updateSound() {
      if (!CONFIG.audioEnabled || !audioContext || !noiseGain) return;

      if (currentMode === 1) {
        // Режим 1: шум пропорционален движению
        var targetVol1 = smoothMotion > 0.05 ? smoothMotion * 0.6 : 0;
        noiseGain.gain.setTargetAtTime(
          targetVol1,
          audioContext.currentTime,
          smoothMotion > 0.05 ? 0.3 : 0.8
        );
      } else {
        // Режим 2: никого нет = громко, человек в кадре = тихо
        var targetVol2 = (1 - smoothPresence) * 0.5;
        noiseGain.gain.setTargetAtTime(
          targetVol2,
          audioContext.currentTime,
          0.8
        );
      }
    }
        // ========================================
    // MEDIAPIPE — ОБРАБОТКА РЕЗУЛЬТАТОВ
    // ========================================
    function onPoseResults(results) {
      if (!results.poseLandmarks || results.poseLandmarks.length === 0) {
        personVisible = false;
        poseMotionIntensity *= 0.85;
        debugInfo.innerHTML = '<div>Человек не найден</div>';
        return;
      }

      var currentLandmarks = results.poseLandmarks;

      // Считаем сколько ключевых суставов видно
      var visibleJoints = 0;
      KEY_JOINTS.forEach(function(idx) {
        if (currentLandmarks[idx].visibility > 0.3) {
          visibleJoints++;
        }
      });

      // Человек в кадре если видно хотя бы 4 сустава
      personVisible = visibleJoints >= 4;

      if (debugWindow.classList.contains('visible')) {
        drawSkeleton(currentLandmarks, results.image);
      }

      if (!lastPoseLandmarks) {
        lastPoseLandmarks = currentLandmarks;
        poseMotionIntensity = 0;
        return;
      }

      var totalMotion = 0;
      var count = 0;

      for (var k = 0; k < KEY_JOINTS.length; k++) {
        var idx  = KEY_JOINTS[k];
        var curr = currentLandmarks[idx];
        var prev = lastPoseLandmarks[idx];

        if (curr.visibility > 0.3 && prev.visibility > 0.3) {
          var dx   = curr.x - prev.x;
          var dy   = curr.y - prev.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > CONFIG.motionThreshold) {
            totalMotion += dist;
            count++;
          }
        }
      }

      lastPoseLandmarks = currentLandmarks;

      if (count === 0) {
        poseMotionIntensity *= 0.85;
        debugInfo.innerHTML =
          '<div>Режим: ' + currentMode + '</div>' +
          '<div>Человек: ' + (personVisible ? 'да' : 'нет') + '</div>' +
          '<div>Присутствие: ' + (smoothPresence * 100).toFixed(0) + '%</div>' +
          '<div>Нет движения</div>';
        return;
      }

      var avgMotion = totalMotion / count;

      if (avgMotion < CONFIG.motionNoiseFloor) {
        poseMotionIntensity *= 0.85;
        debugInfo.innerHTML =
          '<div>Режим: ' + currentMode + '</div>' +
          '<div>Человек: ' + (personVisible ? 'да' : 'нет') + '</div>' +
          '<div>Присутствие: ' + (smoothPresence * 100).toFixed(0) + '%</div>' +
          '<div>Движение: ' + (avgMotion * 1000).toFixed(2) + ' (шум)</div>';
        return;
      }

      var cleanMotion = avgMotion - CONFIG.motionNoiseFloor;
      poseMotionIntensity = Math.min(1, cleanMotion * CONFIG.motionScale);

      debugInfo.innerHTML =
        '<div>Режим: ' + currentMode + '</div>' +
        '<div>Человек: ' + (personVisible ? 'да' : 'нет') + '</div>' +
        '<div>Присутствие: ' + (smoothPresence * 100).toFixed(0) + '%</div>' +
        '<div>Движение: ' + (avgMotion * 1000).toFixed(2) + '</div>' +
        '<div>Интенсивность: ' + (poseMotionIntensity * 100).toFixed(1) + '%</div>' +
        '<div>Суставов: ' + visibleJoints + '</div>';
    }

    // ========================================
    // MEDIAPIPE — СКЕЛЕТ В DEBUG ОКНЕ
    // ========================================
    function drawSkeleton(landmarks, image) {
      var ctx = debugCanvas.getContext('2d');
      var w   = debugCanvas.width;
      var h   = debugCanvas.height;

      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(image, 0, 0, w, h);

      ctx.strokeStyle = 'rgba(0, 255, 100, 0.6)';
      ctx.lineWidth   = 2;

      SKELETON_CONNECTIONS.forEach(function(pair) {
        var a = landmarks[pair[0]];
        var b = landmarks[pair[1]];
        if (a.visibility > 0.3 && b.visibility > 0.3) {
          ctx.beginPath();
          ctx.moveTo(a.x * w, a.y * h);
          ctx.lineTo(b.x * w, b.y * h);
          ctx.stroke();
        }
      });

      ctx.fillStyle = 'rgba(0, 255, 100, 0.9)';
      KEY_JOINTS.forEach(function(idx) {
        var lm = landmarks[idx];
        if (lm.visibility > 0.3) {
          ctx.beginPath();
          ctx.arc(lm.x * w, lm.y * h, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    // ========================================
    // БУКВЫ — ТЕКСТУРА
    // ========================================
    function createLetterTexture(char) {
      var size = 256;
      var c    = document.createElement('canvas');
      c.width  = c.height = size;
      var cx   = c.getContext('2d');
      cx.clearRect(0, 0, size, size);
      cx.fillStyle    = '#ffffff';
      // Rubik Mono One — один вес 400
      cx.font         = '400 ' + Math.floor(size * 0.72) + 'px Rubik Mono One, monospace';
      cx.textAlign    = 'center';
      cx.textBaseline = 'middle';
      cx.fillText(char, size / 2, size / 2);
      return new THREE.CanvasTexture(c);
    }

    // ========================================
    // БУКВЫ — СОЗДАНИЕ
    // ========================================
    function initLetters() {
      letterMeshes.forEach(function(m) {
        if (!m) return;
        scene.remove(m);
        m.geometry.dispose();
        m.material.dispose();
      });
      letterMeshes = [];

      var chars      = CONFIG.text.split('');
      var step       = CONFIG.letterSize + CONFIG.letterSpacing;
      var totalWidth = chars.length * step - CONFIG.letterSpacing;
      var startX     = -totalWidth / 2 + step / 2;

      chars.forEach(function(char, i) {
        if (char === ' ') { letterMeshes.push(null); return; }

        var mesh = new THREE.Mesh(
          new THREE.PlaneGeometry(CONFIG.letterSize, CONFIG.letterSize),
          new THREE.MeshBasicMaterial({
            map:         createLetterTexture(char),
            transparent: true,
            depthWrite:  false,
            opacity:     1.0,
          })
        );

        var homeX = startX + i * step;
        mesh.position.set(homeX, 0, 0);

        mesh.userData = {
          homeX:         homeX,
          homeY:         0,
          homeZ:         0,
          vx:            0,
          vy:            0,
          vz:            0,
          vRotZ:         0,
          vRotX:         0,
          mass:          0.8 + Math.random() * 0.4,
          litPhase:      Math.random() * Math.PI * 2,
          glitchTimer:   0,
          glitchOffsetX: 0,
          glitchOffsetY: 0,
        };

        scene.add(mesh);
        letterMeshes.push(mesh);
      });
    }

    // ========================================
    // БУКВЫ — ФИЗИКА + ГЛИТЧ + ОТСКОК
    // ========================================
    function updateLetters(motionIntensity) {
      time += 0.016;

      // Плавно обновляем присутствие человека
      // Нарастает быстро — человек появился
      // Убывает медленно — хаос возвращается постепенно
      var presenceTarget = personVisible ? 1 : 0;
      var presenceSpeed  = personVisible ? 0.05 : 0.008;
      smoothPresence += (presenceTarget - smoothPresence) * presenceSpeed;

      // Режим 2: автономный хаос = обратное присутствию
      if (currentMode === 2) {
        var targetAutonomous = 1 - smoothPresence;
        autonomousIntensity += (targetAutonomous - autonomousIntensity) * 0.03;
      } else {
        autonomousIntensity += (0 - autonomousIntensity) * 0.05;
      }

      // Итоговая сила хаоса
      var chaosIntensity = currentMode === 1
        ? motionIntensity
        : autonomousIntensity;

      letterMeshes.forEach(function(mesh) {
        if (!mesh) return;
        var ud = mesh.userData;

        // === ИМПУЛЬС ОТ ХАОСА ===
        if (chaosIntensity > 0.01 && Math.random() < chaosIntensity * 0.4) {
          var s = CONFIG.impulseStrength / ud.mass;
          ud.vx    += (Math.random() - 0.5) * s * 2;
          ud.vy    += (Math.random() - 0.5) * s * 2;
          ud.vz    += (Math.random() - 0.5) * CONFIG.zImpulse;
          ud.vRotZ += (Math.random() - 0.5) * CONFIG.rotImpulse / ud.mass;
          ud.vRotX += (Math.random() - 0.5) * CONFIG.rotImpulse * 0.5 / ud.mass;
        }

        // === ПРИТЯЖЕНИЕ К ДОМУ ===
        // В режиме 2 при присутствии человека — сила возврата сильнее
        var returnMult = (currentMode === 2)
          ? (1 + smoothPresence * 10)
          : 1;

        ud.vx    += (ud.homeX - mesh.position.x) * CONFIG.returnForce * returnMult;
        ud.vy    += (ud.homeY - mesh.position.y) * CONFIG.returnForce * returnMult;
        ud.vz    += (ud.homeZ - mesh.position.z) * CONFIG.returnForce * returnMult;
        ud.vRotZ += -mesh.rotation.z * CONFIG.rotReturn * returnMult;
        ud.vRotX += -mesh.rotation.x * CONFIG.rotReturn * returnMult;

        // === ТРЕНИЕ ===
        // В режиме 2 при присутствии человека — трение больше
        var frictionMult = (currentMode === 2)
          ? Math.max(0.92, CONFIG.friction - smoothPresence * 0.04)
          : CONFIG.friction;

        ud.vx    *= frictionMult;
        ud.vy    *= frictionMult;
        ud.vz    *= frictionMult;
        ud.vRotZ *= CONFIG.rotFriction;
        ud.vRotX *= CONFIG.rotFriction;

        // === ОГРАНИЧЕНИЕ СКОРОСТИ ===
        var speed = Math.sqrt(ud.vx * ud.vx + ud.vy * ud.vy);
        if (speed > CONFIG.maxSpeed) {
          ud.vx = (ud.vx / speed) * CONFIG.maxSpeed;
          ud.vy = (ud.vy / speed) * CONFIG.maxSpeed;
        }

        // === ПРИМЕНЯЕМ СКОРОСТЬ ===
        mesh.position.x += ud.vx;
        mesh.position.y += ud.vy;
        mesh.position.z += ud.vz;

        // === ОТСКОК ОТ ГРАНИЦ ЭКРАНА ===
        if (mesh.position.x > CONFIG.boundsX) {
          mesh.position.x = CONFIG.boundsX;
          ud.vx *= -0.6;
        } else if (mesh.position.x < -CONFIG.boundsX) {
          mesh.position.x = -CONFIG.boundsX;
          ud.vx *= -0.6;
        }
        if (mesh.position.y > CONFIG.boundsY) {
          mesh.position.y = CONFIG.boundsY;
          ud.vy *= -0.6;
        } else if (mesh.position.y < -CONFIG.boundsY) {
          mesh.position.y = -CONFIG.boundsY;
          ud.vy *= -0.6;
        }
        if (Math.abs(mesh.position.z) > CONFIG.maxZ) {
          mesh.position.z = Math.sign(mesh.position.z) * CONFIG.maxZ;
          ud.vz *= -0.3;
        }

        // === ВРАЩЕНИЕ ===
        mesh.rotation.z += ud.vRotZ;
        mesh.rotation.x += ud.vRotX;

        // === ВОЛНОВОЕ СМЕЩЕНИЕ ===
        mesh.position.x += Math.sin(time * 2 + ud.litPhase) * CONFIG.litDisplacement * chaosIntensity * 0.02;
        mesh.position.y += Math.cos(time * 1.5 + ud.litPhase) * CONFIG.litDisplacement * chaosIntensity * 0.015;

        // === ГЛИТЧ ===
        ud.glitchTimer -= 1;

        if (chaosIntensity > 0.3 && speed > CONFIG.maxSpeed * 0.5 && Math.random() < 0.03) {
          ud.glitchTimer    = 2 + Math.floor(Math.random() * 3);
          ud.glitchOffsetX  = (Math.random() - 0.5) * 0.3 * chaosIntensity;
          ud.glitchOffsetY  = (Math.random() - 0.5) * 0.15 * chaosIntensity;
        }

        if (ud.glitchTimer > 0) {
          mesh.position.x += ud.glitchOffsetX;
          mesh.position.y += ud.glitchOffsetY;
          var glitchScale = 1 + (Math.random() - 0.5) * 0.15 * chaosIntensity;
          mesh.scale.set(glitchScale, 1 + (Math.random() - 0.5) * 0.1, 1);
          mesh.material.opacity = 0.4 + Math.random() * 0.6;
        } else {
          mesh.scale.set(1, 1, 1);
          var zRatio = Math.abs(mesh.position.z) / CONFIG.maxZ;
          mesh.material.opacity = Math.max(0.05, 1 - zRatio * 0.85);
        }

        litLight.intensity = chaosIntensity * CONFIG.litIntensity;
      });
    }
        // ========================================
    // ГЛАВНЫЙ ЦИКЛ
    // ========================================
    function animate() {
      requestAnimationFrame(animate);

      // Сглаживаем движение
      var smoothing = poseMotionIntensity > smoothMotion
        ? CONFIG.motionRiseSmoothing
        : CONFIG.motionFallSmoothing;
      smoothMotion += (poseMotionIntensity - smoothMotion) * smoothing;

      // Обновляем звук каждый кадр
      if (appStarted) {
        updateSound();
      }

      updateLetters(smoothMotion);
      renderer.render(scene, camera);
    }

    // ========================================
    // ЗАПУСК КАМЕРЫ
    // ========================================
    async function startCamera(deviceId) {
      try {
        statusEl.textContent   = 'запрашиваю камеру...';
        statusEl.style.opacity = '1';
        statusEl.style.display = 'block';

        var constraints = {
          video: deviceId
            ? { deviceId: { exact: deviceId }, width: 640, height: 480 }
            : { width: 640, height: 480, facingMode: 'user' }
        };

        var stream = await navigator.mediaDevices.getUserMedia(constraints);
        activeCameraId = deviceId || null;

        webcamVideo.srcObject = stream;
        debugVideo.srcObject  = stream;

        statusEl.textContent = 'готово';
        setTimeout(function() {
          statusEl.style.opacity = '0';
          setTimeout(function() { statusEl.style.display = 'none'; }, 1000);
        }, 800);

      } catch (err) {
        statusEl.textContent = 'ошибка: ' + err.name;
        statusEl.style.color = 'rgba(255,100,100,0.8)';
        console.error(err);
      }
    }

    // ========================================
    // СПИСОК КАМЕР
    // ========================================
    async function loadCameraList() {
      cameraList.innerHTML = '';
      try {
        await navigator.mediaDevices.getUserMedia({ video: true });
        var devices = await navigator.mediaDevices.enumerateDevices();
        var cameras = devices.filter(function(d) { return d.kind === 'videoinput'; });

        if (cameras.length === 0) {
          cameraList.innerHTML = '<div class="camera-item">камеры не найдены</div>';
          return;
        }

        cameras.forEach(function(cam, i) {
          var btn         = document.createElement('button');
          btn.className   = 'camera-item';
          btn.textContent = cam.label || ('Камера ' + (i + 1));

          if (activeCameraId === cam.deviceId || (!activeCameraId && i === 0)) {
            btn.classList.add('active');
          }

          btn.addEventListener('click', function() {
            cameraList.querySelectorAll('.camera-item').forEach(function(el) {
              el.classList.remove('active');
            });
            btn.classList.add('active');
            startCamera(cam.deviceId);
            closeMenu();
          });

          cameraList.appendChild(btn);
        });

      } catch (err) {
        cameraList.innerHTML = '<div class="camera-item">нет доступа к камере</div>';
        console.error(err);
      }
    }

    // ========================================
    // МЕНЮ
    // ========================================
    function openMenu() {
      overlay.classList.add('visible');
      menuEl.classList.add('visible');
      loadCameraList();
    }

    function closeMenu() {
      overlay.classList.remove('visible');
      menuEl.classList.remove('visible');
    }

    function toggleDebugWindow() {
      debugWindow.classList.toggle('visible');
      if (debugWindow.classList.contains('visible')) {
        setTimeout(function() {
          debugCanvas.width  = debugVideo.offsetWidth;
          debugCanvas.height = debugVideo.offsetHeight;
        }, 100);
      }
    }

    // ========================================
    // ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
    // ========================================
    function setMode(mode) {
      currentMode = mode;

      if (mode === 1) {
        modeIndicator.textContent = 'режим 1';
        autonomousIntensity = 0;
        if (appStarted && noiseGain && audioContext) {
          noiseGain.gain.setTargetAtTime(0, audioContext.currentTime, 0.5);
        }
      }

      if (mode === 2) {
        modeIndicator.textContent = 'режим 2';
        autonomousIntensity = 1;
        if (appStarted && noiseGain && audioContext) {
          var vol = (1 - smoothPresence) * 0.5;
          noiseGain.gain.setTargetAtTime(vol, audioContext.currentTime, 0.3);
        }
      }

      // Мигаем индикатором
      modeIndicator.style.opacity = '1';
      setTimeout(function() {
        modeIndicator.style.opacity = '0.2';
      }, 1500);
    }

    // ========================================
    // СОБЫТИЯ КЛАВИАТУРЫ
    // ========================================
    document.addEventListener('keydown', function(e) {
      if (e.key === '1') { setMode(1); }
      if (e.key === '2') { setMode(2); }
      if (e.key === 'Escape') {
        closeMenu();
        debugWindow.classList.remove('visible');
      }
    });

    // ========================================
    // СОБЫТИЯ КНОПОК
    // ========================================
    settingsBtn.addEventListener('click', openMenu);
    debugBtn.addEventListener('click', toggleDebugWindow);
    debugClose.addEventListener('click', function() {
      debugWindow.classList.remove('visible');
    });
    overlay.addEventListener('click', closeMenu);
    closeBtn.addEventListener('click', closeMenu);

    // ========================================
    // RESIZE
    // ========================================
    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      var aspect     = window.innerWidth / window.innerHeight;
      CONFIG.boundsX = 5.5 * aspect / (16 / 9);
      CONFIG.boundsY = 3.2;
    });

    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        var aspect     = window.innerWidth / window.innerHeight;
        CONFIG.boundsX = 5.5 * aspect / (16 / 9);
        CONFIG.boundsY = 3.2;
      }, 100);
    });

    // ========================================
    // КНОПКА СТАРТА
    // ========================================
    startBtn.addEventListener('click', function() {
      startBtn.style.opacity       = '0';
      startBtn.style.pointerEvents = 'none';
      setTimeout(function() { startBtn.style.display = 'none'; }, 400);

      // Браузер требует действия пользователя перед запуском аудио
      initAudio();
      appStarted = true;

      if (currentMode === 2 && noiseGain && audioContext) {
        var vol = (1 - smoothPresence) * 0.5;
        noiseGain.gain.setTargetAtTime(vol, audioContext.currentTime, 0.5);
      }
    });

    // ========================================
    // ИНИЦИАЛИЗАЦИЯ
    // ========================================
    window.addEventListener('load', function() {

      // Считаем правильные границы под текущий экран
      var aspect     = window.innerWidth / window.innerHeight;
      CONFIG.boundsX = 5.5 * aspect / (16 / 9);
      CONFIG.boundsY = 3.2;

      // Ждём загрузки шрифта — только потом рисуем буквы
      document.fonts.ready.then(function() {
        initLetters();
        animate();

        // Запускаем MediaPipe Pose
        var pose = new Pose({
          locateFile: function(file) {
            return 'https://cdn.jsdelivr.net/npm/@mediapipe/pose/' + file;
          }
        });

        pose.setOptions({
          modelComplexity:        1,
          smoothLandmarks:        true,
          enableSegmentation:     false,
          smoothSegmentation:     false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence:  0.5
        });

        pose.onResults(onPoseResults);

        startCamera();

        // Camera helper — отправляет кадры в MediaPipe
        var cameraHelper = new Camera(webcamVideo, {
          onFrame: async function() {
            await pose.send({ image: webcamVideo });
          },
          width:  640,
          height: 480
        });

        cameraHelper.start();
      });
    });

  </script>
</body>
</html>
